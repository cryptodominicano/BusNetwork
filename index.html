    <script>
      // Remove Lovable badge only - very targeted approach
      function removeBadge() {
        // Only remove iframes (Lovable uses iframes for badge)
        document.querySelectorAll('iframe').forEach(el => el.remove());

        // Remove elements with lovable in href only
        document.querySelectorAll('a[href*="lovable"]').forEach(el => el.remove());
      }

      // Run once after page loads
      window.addEventListener('load', () => {
        setTimeout(removeBadge, 1000);
      });

      // Intercept all form submissions and send to Formspree
      document.addEventListener('submit', async function(e) {
        const form = e.target;
        if (form.tagName === 'FORM') {
          e.preventDefault();

          // Gather form data directly from inputs for React compatibility
          const data = {};
          const inputs = form.querySelectorAll('input, textarea, select');
          inputs.forEach((input, i) => {
            const val = input.value || '';
            if (!val.trim()) return;
            let name = input.name || input.id;
            if (!name) {
              const ph = (input.placeholder || '').toLowerCase();
              if (ph.includes('name')) name = 'name';
              else if (ph.includes('email') || input.type === 'email') name = 'email';
              else if (ph.includes('phone') || input.type === 'tel') name = 'phone';
              else if (ph.includes('company')) name = 'company';
              else if (ph.includes('message') || input.tagName === 'TEXTAREA') name = 'message';
              else name = 'field_' + i;
            }
            data[name] = val;
          });

          if (Object.keys(data).length === 0) {
            alert('Please fill in at least one field.');
            return;
          }

          try {
            const response = await fetch('https://formspree.io/f/xjgpopra', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Accept': 'application/json'
              },
              body: JSON.stringify(data)
            });

            const result = await response.json().catch(() => ({}));
            console.log('Form response:', response.status, result);

            if (response.ok) {
              if (typeof gtag !== 'undefined') {
                gtag('event', 'generate_lead', {
                  event_category: 'Contact Form',
                  event_label: 'Fleet Assessment Request',
                  value: 1
                });
              }
              alert('Thank you! Your message has been sent.');
              form.reset();
            } else {
              console.error('Formspree error:', result);
              alert('Error: ' + (result.error || result.errors?.[0]?.message || 'There was an error sending your message. Please try again.'));
            }
          } catch (error) {
            console.error('Form submission error:', error);
            alert('Network error: ' + error.message);
          }
        }
      }, true);

            const lastChild = navLinks.lastElementChild;
            if (lastChild) navLinks.insertBefore(link, lastChild);

      }

      // Add "Additional Questions" textarea to the contact form
      function addQuestionsField() {
        if (document.querySelector('.additional-questions-container')) return;

        const form = document.querySelector('form');
        if (!form) return;

        // Find the submit button to insert before it
        const submitBtn = form.querySelector('button[type="submit"]');
        if (!submitBtn) return;

        // Create the container
        const container = document.createElement('div');
        container.className = 'additional-questions-container';

        // Create label
        const label = document.createElement('label');
        label.htmlFor = 'additional-questions';
        label.textContent = 'Additional Questions or Comments';

        // Create textarea
        const textarea = document.createElement('textarea');
        textarea.id = 'additional-questions';
        textarea.name = 'additional_questions';
        textarea.className = 'additional-questions-textarea';
        textarea.placeholder = 'Any other questions or information you\'d like to share...';
        textarea.rows = 4;

        container.appendChild(label);
        container.appendChild(textarea);

        // Insert before submit button's parent (usually a div wrapper)
        const btnParent = submitBtn.parentElement;
        if (btnParent && btnParent !== form) {
          form.insertBefore(container, btnParent);
        } else {
          form.insertBefore(container, submitBtn);
        }
      }

          card.onmouseleave = function() { card.style.borderColor = 'hsl(210,30%,88%)'; card.style.boxShadow = 'none'; };

          h3.style.cssText = 'font-size:1.05rem; font-weight:700; color:hsl(213,37%,24%); margin-bottom:8px;';

          var p = document.createElement('p');
          p.style.cssText = 'font-size:0.9rem; line-height:1.6; color:hsl(213,20%,40%); margin-bottom:8px;';

          grid2.appendChild(card);
        });
        inner.appendChild(grid2);

        section.appendChild(inner);
        insertAfter.parentNode.insertBefore(section, insertAfter.nextSibling);
      }

      // Remove phone numbers, old contact info, and Gold Coast references from React-rendered content
      function cleanUpReactContent() {
        // Remove any phone number links
        document.querySelectorAll('a[href*="tel:"]').forEach(el => el.remove());
        document.querySelectorAll('a[href*="wa.me"]').forEach(el => el.remove());

        // Replace Pricing nav link with Blog in React-rendered header
        document.querySelectorAll('header a, nav a').forEach(el => {
          if (el.textContent.trim() === 'Pricing' && el.getAttribute('href') && el.getAttribute('href').includes('pricing')) {
            el.href = '/blog/what-is-dvir';
            el.textContent = 'Blog';
          }
        });

        // Replace old email with new
        document.querySelectorAll('a[href*="GoldCoastAI"], a[href*="goldcoastai"]').forEach(el => {
          el.href = 'mailto:Isaias@InteliaRD.com';
          el.textContent = 'Isaias@InteliaRD.com';
        });

        // Walk all text nodes and clean up phone numbers and old references
        var walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, null, false);
        var node;
        while (node = walker.nextNode()) {
          // Remove phone number patterns
          if (node.textContent.match(/\(610\)\s*357[- ]?5363|610[\-.]357[\-.]5363/)) {
            node.textContent = node.textContent.replace(/\(610\)\s*357[- ]?5363|610[\-.]357[\-.]5363/g, '');
          }
          // Remove "Or call us directly" type text
          if (node.textContent.match(/Or call[^.]*$/i)) {
            node.textContent = node.textContent.replace(/Or call[^.]*$/i, '');
          }
          // Replace Gold Coast references
          if (node.textContent.includes('Gold Coast AI Automations')) {
            node.textContent = node.textContent.replace('A Gold Coast AI Automations Company', '');
            node.textContent = node.textContent.replace('Gold Coast AI Automations', '');
          }
          if (node.textContent.includes('GoldCoastAI')) {
            node.textContent = node.textContent.replace(/Support@GoldCoastAI\.pro/gi, 'Isaias@InteliaRD.com');
            node.textContent = node.textContent.replace(/GoldCoastAI\.pro/gi, '');
          }
        }

        // Remove parent elements that are now empty after phone removal
        document.querySelectorAll('p, span, div').forEach(el => {
          if (el.textContent.trim() === '' && el.children.length === 0 && el.closest('footer')) {
            el.remove();
          }
        });
      }
